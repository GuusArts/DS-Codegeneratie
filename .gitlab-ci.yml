include:
      - project: 'ocs/cicd/parent'
        ref: parent-1.2
        file: '/.gitlab-ci.yml'

default:
      image: maven:3.9-amazoncorretto-21-debian

.testphase:
  rules:
    - when: never
stop test:
  rules:
    - when: never

pages:
  rules:
    - if: $CI_COMMIT_TAG
      when: always
    - when: never
